<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultanul Arifinee | Web Developer & CEO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            cursor: none;
        }

        body {
            transition: background-color 0.5s ease;
            overflow-x: hidden;
            scroll-behavior: auto;
        }

        .text-primary {
            color: #ff4d4d !important;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100vh;
            pointer-events: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.2);
        }

        /* Cursor */
        #cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            transform: translate(-50%, -50%);
        }

        #cursor-outline {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 77, 77, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        /* Social Dock */
        .social-dock {
            position: fixed;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .dock-item {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }

        .dock-item:hover {
            transform: translateX(-10px) rotateY(-20deg) scale(1.1);
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2);
        }

        .dock-name {
            position: absolute;
            right: 65px;
            background: #ff4d4d;
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .dock-item:hover .dock-name {
            opacity: 1;
            transform: translateX(0);
        }

        .dock-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Custom Sidebar Scrollbar */
        #dashboard-sidebar div::-webkit-scrollbar {
            width: 3px;
        }

        #dashboard-sidebar div::-webkit-scrollbar-thumb {
            background: #ff4d4d33;
            border-radius: 10px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
        }
    </style>
</head>

<body class="bg-lightBg dark:bg-darkBg text-slate-900 dark:text-slate-100">

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>
    <div id="canvas-container"></div>
    <div id="header"></div>


    <main class="pt-32 pb-24 px-4 md:px-12 max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">

        <div id="sidebar"></div>

        <div class="flex-1 space-y-8">
           <div class="mt-12 mb-6">
    <h3 class="text-xl font-black uppercase tracking-tighter italic">Referral <span class="text-primary">Tools</span></h3>
    <p class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-40">Your unique assets for tracking sales</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <div class="lg:col-span-2 space-y-6">
        <div class="glass p-8 rounded-[2.5rem] border-white/5 bg-gradient-to-br from-primary/5 to-transparent relative overflow-hidden">
            <div class="relative z-10">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] opacity-40 mb-4 ml-1">Your Unique Referral Link</label>
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="flex-1 glass bg-white/5 border border-white/10 rounded-2xl px-6 py-4 flex items-center overflow-hidden">
                        <span class="text-xs font-bold text-primary mr-2">https://</span>
                        <input type="text" readonly value="requinbd.com/enroll?ref=SULTAN2026" 
                            class="bg-transparent border-none text-xs font-bold w-full focus:outline-none text-white/90">
                    </div>
                    <button class="bg-primary text-white text-[10px] font-black uppercase tracking-widest px-8 py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                        Copy Link
                    </button>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] border-white/5 flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] opacity-40 mb-2">Personal Referral Code</label>
                <h3 class="text-3xl font-black italic tracking-widest text-white">SULTAN2026</h3>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button class="flex-1 md:flex-none glass border-white/10 px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:border-primary transition-all">
                    Edit Code
                </button>
                <button class="flex-1 md:flex-none glass border-white/10 px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:border-primary transition-all">
                    Share Code
                </button>
            </div>
        </div>
    </div>

    <div class="glass p-8 rounded-[2.5rem] border-white/5 flex flex-col items-center justify-center text-center">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 mb-6">Scan to Enroll</label>
        
        <div class="relative p-4 glass rounded-[2rem] border-primary/20 bg-white mb-6 group cursor-pointer shadow-[0_0_30px_rgba(255,77,77,0.1)]">
            <div class="w-32 h-32 bg-white flex items-center justify-center">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://requinbd.com/enroll?ref=SULTAN2026" alt="QR Code" class="w-full h-full">
            </div>
            <div class="absolute inset-0 bg-primary/90 rounded-[2rem] opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300">
                <span class="text-white text-[10px] font-black uppercase tracking-widest">Download PNG</span>
            </div>
        </div>
        
        <p class="text-[9px] font-bold opacity-30 uppercase leading-relaxed px-4">
            Download this QR to use in your social media posts or printed banners.
        </p>
    </div>

</div>
        </div>
    </main>

    <button id="sidebar-toggle" onclick="toggleSidebar()"
        class="fixed bottom-6 right-6 z-[70] lg:hidden w-14 h-14 bg-primary text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all border border-white/20">☰</button>

    <script src="script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            function loadHTML(id, file) {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("File not found: " + file);
                        }
                        return response.text();
                    })
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    })
                    .catch(error => console.error(error));
            }

            loadHTML("header", "header.html");
            loadHTML("sidebar", "sidebar.html");

        });
    </script>
</body>

</html>
